<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSUBI 성격검사 (MPI) v0.1</title>
<style>
  :root{--bg:#0d0b09;--surface:#171310;--surface2:#211b16;--gold:#c9a45c;--gold-light:#e6cf9a;
    --text:#f2ece1;--muted:#9c8f7d;--danger:#d99790;--ok:#8fc6a8;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Apple SD Gothic Neo','Noto Sans KR','Pretendard',sans-serif;}
  body{background:linear-gradient(160deg,#0a0806,#141008);min-height:100vh;color:var(--text);display:flex;justify-content:center;padding:24px 16px;}
  .app{width:100%;max-width:520px;}
  .logo{text-align:center;font-size:24px;font-weight:800;letter-spacing:2px;margin:18px 0 4px;}
  .logo em{color:var(--gold);font-style:normal;}
  .sub{text-align:center;font-size:11px;color:var(--muted);letter-spacing:3px;margin-bottom:26px;}
  .card{background:var(--surface);border:1px solid #2e2620;border-radius:20px;padding:24px;margin-bottom:16px;}
  h2{font-size:19px;margin-bottom:12px;}
  p{font-size:13.5px;color:var(--muted);line-height:1.75;margin-bottom:10px;}
  .goldbtn{width:100%;background:linear-gradient(135deg,#c9a45c,#a07c33);color:#171008;font-weight:700;font-size:15px;border:none;border-radius:14px;padding:15px;cursor:pointer;margin-top:8px;}
  .ghost{width:100%;background:none;border:1px solid #3a3128;color:var(--muted);font-size:13px;border-radius:14px;padding:13px;cursor:pointer;margin-top:8px;}
  .verbtn{display:flex;align-items:center;gap:14px;width:100%;background:var(--surface2);border:1px solid #3a3128;border-radius:16px;padding:18px;cursor:pointer;margin-bottom:10px;text-align:left;color:var(--text);}
  .verbtn:hover{border-color:var(--gold);}
  .verbtn .ic{font-size:26px;}
  .verbtn b{display:block;font-size:15px;}
  .verbtn span{font-size:12px;color:var(--muted);}
  .prog{height:6px;background:#241d15;border-radius:3px;margin-bottom:8px;overflow:hidden;}
  .prog .bar{height:100%;background:linear-gradient(90deg,#c9a45c,#e6cf9a);border-radius:3px;transition:width .25s;}
  .pnum{font-size:11px;color:var(--muted);text-align:right;margin-bottom:18px;}
  .qtext{font-size:17px;line-height:1.7;min-height:86px;margin-bottom:22px;font-weight:600;}
  .lik{display:flex;flex-direction:column;gap:8px;}
  .lk{display:flex;align-items:center;gap:12px;border:1.5px solid #3a3128;background:var(--surface2);border-radius:14px;padding:13px 16px;cursor:pointer;font-size:14px;color:var(--text);}
  .lk:hover{border-color:var(--gold);}
  .lk.sel{border-color:var(--gold);background:rgba(201,164,92,.15);}
  .lk .n{width:26px;height:26px;border-radius:50%;background:#2a231c;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--gold-light);flex-shrink:0;}
  .navrow{display:flex;gap:10px;margin-top:18px;}
  .navrow .ghost{margin-top:0;width:110px;}
  .disc{text-align:center;font-size:10px;color:#4d4335;margin-top:12px;line-height:1.6;}
  /* results */
  .verdict{border-radius:16px;padding:18px;text-align:center;margin-bottom:18px;font-weight:800;font-size:17px;}
  .v-pass{background:rgba(95,156,122,.15);border:1px solid rgba(95,156,122,.5);color:var(--ok);}
  .v-hold{background:rgba(201,164,92,.12);border:1px solid rgba(201,164,92,.5);color:var(--gold-light);}
  .v-fail{background:rgba(176,86,79,.13);border:1px solid rgba(176,86,79,.5);color:var(--danger);}
  .verdict small{display:block;font-weight:400;font-size:12px;margin-top:8px;line-height:1.6;opacity:.85;}
  .scrow{margin-bottom:16px;}
  .st1{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px;}
  .st1 .sv{font-weight:800;color:var(--gold-light);}
  .sbar{height:9px;background:#241d15;border-radius:5px;position:relative;}
  .sfill{height:100%;border-radius:5px;}
  .cut{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--danger);}
  .st2{display:flex;justify-content:space-between;font-size:10px;color:#6b5f4f;margin-top:4px;}
  .pill{font-size:10px;padding:2px 9px;border-radius:10px;font-weight:800;margin-left:6px;}
  .p-ok{background:rgba(95,156,122,.2);color:var(--ok);}
  .p-warn{background:rgba(201,164,92,.2);color:var(--gold-light);}
  .p-bad{background:rgba(176,86,79,.2);color:var(--danger);}
  .vflag{font-size:12.5px;line-height:1.7;color:var(--muted);border-top:1px dashed #2e2620;padding-top:12px;margin-top:6px;}
</style>
</head>
<body>
<div class="app">
  <div class="logo">MU<em>SUBI</em> MPI</div>
  <div class="sub">PERSONALITY INVENTORY v0.1</div>
  <div id="stage"></div>

</div>

const INF=["나는 지난 한 달 동안 잠을 전혀 자지 않았다.","나는 내가 사는 나라의 수도가 어디인지 모른다."];
const INC={
 m:[{q:"마음에 드는 사람이 있어도 먼저 연락하지 않는 편이다.",ref:["K3",0],dir:-1},
    {q:"연인과 연락이 잠시 안 되어도 크게 신경 쓰지 않는다.",ref:["K7",5],dir:-1}],
 f:[{q:"데이트 비용을 나누자는 제안이 불편하다.",ref:["J3",0],dir:-1},

/* ---------- 검사 시퀀스 구성 ---------- */
let VER=null, SEQ=[], ANS=[], pos=0;
function buildSeq(v){
  const sc=SCALES[v], seq=[];
  for(let r=0;r<8;r++)for(let s=0;s<sc.length;s++)
    seq.push({t:sc[s].it[r][0],rev:sc[s].it[r][1],scale:sc[s].c,idx:r,kind:"c"});
  // 타당도 문항 삽입
  SD.forEach((t,k)=>seq.splice(9+k*10,0,{t,kind:"sd",idx:k}));
  seq.splice(24,0,{t:INF[0],kind:"inf",idx:0});
  seq.splice(48,0,{t:INF[1],kind:"inf",idx:1});
  INC[v].forEach((o,k)=>seq.push({t:o.q,kind:"inc",idx:k}));
  return seq;
}

/* ---------- 화면 ---------- */
const stage=document.getElementById('stage');
function intro(){
  stage.innerHTML=`
  <div class="card">
    <h2>무스비 성격검사 (MPI)</h2>
    <p>정신건강의학과 전문의가 설계·감수한 심리평가입니다. 각 문장이 자신과 얼마나 일치하는지 솔직하게 응답해 주세요. 정답은 없으며, 잘 보이려는 응답은 타당도 지표에 의해 감지되어 재검사로 이어질 수 있습니다.</p>
    <p>소요 시간 약 12~15분 · 5점 척도 · 중간에 이전 문항으로 돌아갈 수 있습니다.</p>
  </div>
  <div class="card">
    <button class="verbtn" onclick="start('m')"><span class="ic">🤵</span><span><b>남성용 MPI-M</b><span>8개 척도 · 74문항 (타당도 포함)</span></span></button>
    <button class="verbtn" onclick="start('f')"><span class="ic">👰</span><span><b>여성용 MPI-F</b><span>7개 척도 · 66문항 (타당도 포함) · 일본어판 준비 중</span></span></button>
  </div>`;
}
function start(v){VER=v;SEQ=buildSeq(v);ANS=new Array(SEQ.length).fill(0);pos=0;render();}
function render(){
  const q=SEQ[pos], pct=Math.round(pos/SEQ.length*100);
  stage.innerHTML=`
  <div class="card">
    <div class="prog"><div class="bar" style="width:${pct}%"></div></div>
    <div class="pnum">${pos+1} / ${SEQ.length}</div>
    <div class="qtext">${q.t}</div>
    <div class="lik">${LIKERT.map((l,k)=>`
      <div class="lk ${ANS[pos]===k+1?'sel':''}" onclick="pick(${k+1})"><span class="n">${k+1}</span>${l}</div>`).join('')}</div>
    <div class="navrow">
      <button class="ghost" onclick="back()" ${pos===0?'disabled style="opacity:.35"':''}>← 이전</button>
    </div>
  </div>`;
}
function pick(v){
  ANS[pos]=v;
  setTimeout(()=>{ if(pos<SEQ.length-1){pos++;render();} else finish(); },150);
}
function back(){if(pos>0){pos--;render();}}

/* ---------- 채점 ---------- */
function finish(){
  const sc=SCALES[VER];
  // 척도 점수
  const res=sc.map(s=>{
    const vals=SEQ.map((q,i)=>q.kind==="c"&&q.scale===s.c?(q.rev?6-ANS[i]:ANS[i]):null).filter(x=>x!==null);
    const mean=vals.reduce((a,b)=>a+b,0)/vals.length;
    return {...s,mean};
  });
  // 타당도
  const sdHi=SEQ.filter((q,i)=>q.kind==="sd"&&ANS[i]>=4).length;
  const infHi=SEQ.filter((q,i)=>q.kind==="inf"&&ANS[i]>=4).length;
  const incFlags=INC[VER].map((o,k)=>{
    const vIdx=SEQ.findIndex(q=>q.kind==="inc"&&q.idx===k);
    const refItem=SCALES[VER].find(s=>s.c===o.ref[0]).it[o.ref[1]];
    const refIdx=SEQ.findIndex(q=>q.kind==="c"&&q.scale===o.ref[0]&&q.idx===o.ref[1]);
    const refKeyed=refItem[1]?6-ANS[refIdx]:ANS[refIdx];
    const vKeyed=o.dir===-1?6-ANS[vIdx]:ANS[vIdx];
    return Math.abs(vKeyed-refKeyed)>=2;
  });
  const incBoth=incFlags.every(x=>x);
  const invalid=sdHi>=5||infHi>=1||incBoth;
  const sdWarn=sdHi===4;

  // 판정
  const gateFails=res.filter(s=>s.gate===1&&s.mean<s.cut).length;
  const k7fail=res.some(s=>s.gate===2&&s.mean<s.cut);
  const social=res.find(s=>s.gate===0);
  let vClass,vTitle,vDesc;
  if(invalid){vClass="v-hold";vTitle="판정 보류 — 재검사 필요";
    vDesc="타당도 지표 기준을 초과했습니다. 솔직한 응답으로 1회 재검사가 안내됩니다.";}
  else if(k7fail){vClass="v-fail";vTitle="불합격 (안전 기준 미달)";
    vDesc=(VER==='m'?"존중·비구속":"핵심")+" 척도가 엄격 기준(3.8) 미만입니다. 단독 사유로 가입이 제한됩니다.";}
  else if(gateFails>=2){vClass="v-fail";vTitle="불합격";
    vDesc="기준 미달 척도가 2개 이상입니다. 6개월 후 재신청이 가능합니다.";}
  else if(gateFails===1||sdWarn){vClass="v-hold";vTitle="조건부 — 화상 인터뷰에서 확인";
    vDesc=(gateFails===1?"기준 미달 척도 1개는 인터뷰에서 행동 사례로 확인 후 판정합니다. ":"")+(sdWarn?"사회적 바람직성 응답 경향이 다소 높아 인터뷰에서 확인합니다.":"");}
  else{vClass="v-pass";vTitle="1차 통과 — 화상 인터뷰로 진행";
    vDesc="모든 척도가 기준을 충족했습니다. 검사 결과의 일관성을 화상 인터뷰에서 최종 확인합니다.";}

  stage.innerHTML=`
  <div class="card">
    <h2>검증 결과</h2>
    <div class="verdict ${vClass}">${vTitle}<small>${vDesc}</small></div>
    ${res.map(s=>{
      const pass=s.mean>=s.cut;
      const pill=s.gate===0?(pass?'<span class="pill p-ok">이벤트 우선 초대</span>':'<span class="pill p-warn">일반 초대</span>')
        :(pass?'<span class="pill p-ok">PASS</span>':(s.gate===2?'<span class="pill p-bad">미달 (안전 기준)</span>':'<span class="pill p-warn">기준 미달</span>'));
      return `<div class="scrow">
        <div class="st1"><span>${s.n}${pill}</span><span class="sv">${s.mean.toFixed(2)}</span></div>
        <div class="sbar"><div class="sfill" style="width:${(s.mean-1)/4*100}%;background:${pass?'linear-gradient(90deg,#8fae7c,#5f9c7a)':'linear-gradient(90deg,#b0564f,#8a423d)'}"></div>
        <div class="cut" style="left:${(s.cut-1)/4*100}%"></div></div>
        <div class="st2"><span>1.0</span><span>기준 ${s.cut}</span><span>5.0</span></div></div>`;
    }).join('')}
    <div class="vflag">타당도 지표 — 사회적 바람직성: ${sdHi}/6 ${sdHi>=5?'(무효)':sdHi===4?'(주의)':'(정상)'} · 드문 반응: ${infHi}/2 ${infHi?'(무효)':'(정상)'} · 비일관성: ${incFlags.filter(x=>x).length}/2쌍 ${incBoth?'(무효)':'(정상)'}</div>
    <button class="goldbtn" onclick="intro()">처음으로</button>
  </div>`;
}
intro();
</script>
</body>
</html>
