<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0b09">
<title>MUSUBI 무스비 — 結び</title>
<style>
  :root{--bg:#0d0b09;--surface:#171310;--surface2:#211b16;--gold:#c9a45c;--gold-light:#e6cf9a;
    --text:#f2ece1;--muted:#9c8f7d;--danger:#d99790;--dangerbg:#b0564f;--ok:#8fc6a8;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Apple SD Gothic Neo','Noto Sans KR','Hiragino Sans','Pretendard',sans-serif;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:#060504;display:flex;justify-content:center;color:var(--text);}
  .shell{width:100%;max-width:480px;height:100dvh;background:var(--bg);position:relative;overflow:hidden;
    box-shadow:0 0 60px rgba(0,0,0,.8);}
  .screen{position:absolute;inset:0;padding:max(16px,env(safe-area-inset-top)) 0 86px;display:none;flex-direction:column;overflow:hidden;}
  .screen.active{display:flex;}
  .full{padding-bottom:0!important;}

  /* ===== onboarding / test ===== */
  .onb{position:absolute;inset:0;background:var(--bg);z-index:70;display:none;flex-direction:column;
    padding:max(28px,env(safe-area-inset-top)) 24px 28px;overflow-y:auto;}
  .onb.active{display:flex;}
  .step{font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:10px;}
  .onb h2{font-size:21px;font-weight:800;line-height:1.45;margin-bottom:8px;}
  .desc{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:20px;}
  .obody{flex:1;}
  .ofoot{padding-top:16px;}
  .goldbtn{width:100%;background:linear-gradient(135deg,#c9a45c,#a07c33);color:#171008;font-weight:700;
    font-size:15px;border:none;border-radius:14px;padding:15px;cursor:pointer;}
  .goldbtn:disabled{opacity:.35;}
  .ghostbtn{width:100%;background:none;border:none;color:var(--muted);font-size:13px;margin-top:14px;cursor:pointer;text-decoration:underline;}
  .splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .splash .mark{font-size:56px;margin-bottom:16px;}
  .splash .bn{font-size:34px;font-weight:800;letter-spacing:3px;}
  .splash .bn em{color:var(--gold);font-style:normal;}
  .splash .bs{font-size:12px;color:var(--muted);letter-spacing:5px;margin-top:8px;}
  .splash .tg{font-size:14px;color:var(--muted);margin-top:28px;line-height:1.85;}
  .verbtn{display:flex;align-items:center;gap:14px;width:100%;background:var(--surface2);border:1.5px solid #3a3128;
    border-radius:16px;padding:18px;cursor:pointer;margin-bottom:12px;text-align:left;color:var(--text);}
  .verbtn .ic{font-size:28px;}
  .verbtn b{display:block;font-size:15.5px;margin-bottom:3px;}
  .verbtn span{font-size:12px;color:var(--muted);line-height:1.5;}
  .prog{height:5px;background:#241d15;border-radius:3px;margin-bottom:8px;overflow:hidden;flex-shrink:0;}
  .prog .bar{height:100%;background:linear-gradient(90deg,#c9a45c,#e6cf9a);border-radius:3px;transition:width .25s;}
  .pnum{font-size:11px;color:var(--muted);text-align:right;margin-bottom:16px;}
  .qtext{font-size:17.5px;line-height:1.7;min-height:92px;margin-bottom:20px;font-weight:600;}
  .lik{display:flex;flex-direction:column;gap:9px;}
  .lk{display:flex;align-items:center;gap:12px;border:1.5px solid #3a3128;background:var(--surface2);
    border-radius:14px;padding:14px 16px;cursor:pointer;font-size:14px;}
  .lk.sel{border-color:var(--gold);background:rgba(201,164,92,.15);}
  .lk .n{width:26px;height:26px;border-radius:50%;background:#2a231c;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:800;color:var(--gold-light);flex-shrink:0;}
  .backlink{background:none;border:none;color:var(--muted);font-size:13px;margin-top:16px;cursor:pointer;}
  .docrow{display:flex;align-items:center;gap:12px;border:1px solid #2e2620;border-radius:14px;padding:15px;
    margin-bottom:10px;background:var(--surface);cursor:pointer;}
  .docrow .di{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .docrow .dn{font-size:13.5px;font-weight:600;}
  .docrow .ds{font-size:11px;color:var(--muted);margin-top:2px;}
  .docrow .dst{font-size:11px;color:#6b5f4f;font-weight:700;margin-left:auto;flex-shrink:0;}
  .docrow.up{border-color:rgba(95,156,122,.5);}
  .docrow.up .dst{color:var(--ok);}
  .slot{border:1.5px solid #3a3128;background:var(--surface2);border-radius:14px;padding:15px;margin-bottom:10px;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;}
  .slot.sel{border-color:var(--gold);background:rgba(201,164,92,.15);}
  .slot span{color:var(--muted);font-size:12px;}
  .drcard{border:1px solid rgba(201,164,92,.4);border-radius:16px;padding:16px;background:linear-gradient(135deg,#1d1710,#241c12);
    display:flex;gap:14px;align-items:center;margin-bottom:16px;}
  .drcard .em{font-size:30px;}
  .drcard b{font-size:13.5px;display:block;margin-bottom:4px;}
  .drcard span{font-size:11.5px;color:var(--muted);line-height:1.55;}

  /* ===== verdict / score bars ===== */
  .verdict{border-radius:16px;padding:18px;text-align:center;margin-bottom:18px;font-weight:800;font-size:16.5px;}
  .v-pass{background:rgba(95,156,122,.15);border:1px solid rgba(95,156,122,.5);color:var(--ok);}
  .v-hold{background:rgba(201,164,92,.12);border:1px solid rgba(201,164,92,.5);color:var(--gold-light);}
  .v-fail{background:rgba(176,86,79,.13);border:1px solid rgba(176,86,79,.5);color:var(--danger);}
  .verdict small{display:block;font-weight:400;font-size:12px;margin-top:8px;line-height:1.6;opacity:.85;}
  .scrow{margin-bottom:14px;}
  .st1{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;align-items:center;}
  .st1 .sv{font-weight:800;color:var(--gold-light);}
  .sbar{height:8px;background:#241d15;border-radius:4px;position:relative;}
  .sfill{height:100%;border-radius:4px;}
  .cut{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--danger);}
  .st2{display:flex;justify-content:space-between;font-size:10px;color:#6b5f4f;margin-top:3px;}
  .pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:800;margin-left:6px;}
  .p-ok{background:rgba(95,156,122,.2);color:var(--ok);}
  .p-warn{background:rgba(201,164,92,.2);color:var(--gold-light);}
  .p-bad{background:rgba(176,86,79,.2);color:var(--danger);}
  .vflag{font-size:12px;line-height:1.7;color:var(--muted);border-top:1px dashed #2e2620;padding-top:12px;margin:8px 0 14px;}

  /* ===== app: tabbar ===== */
  .tabbar{position:absolute;bottom:0;left:0;right:0;height:calc(72px + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);background:rgba(13,11,9,.97);border-top:1px solid #2a231c;display:none;z-index:40;}
  .tabbar.on{display:flex;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#6b5f4f;font-size:10px;}
  .tab svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.7;}
  .tab.on{color:var(--gold);}
  .apptitle{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 12px;flex-shrink:0;}
  .apptitle .logo{font-weight:800;font-size:19px;letter-spacing:1px;}
  .apptitle .logo em{color:var(--gold);font-style:normal;}
  .apptitle .sub{font-size:10px;color:var(--muted);letter-spacing:2px;}
  .icbtn{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--gold);cursor:pointer;font-size:15px;}

  /* ===== discover ===== */
  .cardwrap{flex:1;position:relative;margin:0 16px 8px;}
  .pcard{position:absolute;inset:0;border-radius:24px;overflow:hidden;background:var(--surface);border:1px solid #2e2620;
    box-shadow:0 18px 40px rgba(0,0,0,.5);transition:transform .35s ease,opacity .35s ease;}
  .pcard.gone-l{transform:translateX(-120%) rotate(-8deg);opacity:0;}
  .pcard.gone-r{transform:translateX(120%) rotate(8deg);opacity:0;}
  .photo{position:absolute;inset:0;background-size:cover;background-position:center 20%;}
  .grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(10,8,6,.93) 100%);}
  .vbadge{position:absolute;top:16px;left:16px;background:rgba(13,11,9,.75);border:1px solid var(--gold);color:var(--gold-light);
    font-size:11px;padding:5px 10px;border-radius:20px;backdrop-filter:blur(4px);}
  .pinfo{position:absolute;left:20px;right:20px;bottom:18px;}
  .pinfo h2{font-size:24px;font-weight:700;}
  .pinfo h2 .age{font-size:19px;font-weight:400;color:#d8cdbb;margin-left:8px;}
  .loc{font-size:12.5px;color:#cbbfa9;margin-top:5px;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .chip{font-size:11px;padding:4px 10px;border-radius:14px;background:rgba(201,164,92,.16);border:1px solid rgba(201,164,92,.4);color:var(--gold-light);}
  .chip.score{background:rgba(95,156,122,.16);border-color:rgba(95,156,122,.45);color:#a9d4bc;}
  .actions{display:flex;justify-content:center;gap:26px;padding:12px 0 4px;flex-shrink:0;}
  .act{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;
    border:1px solid #332b22;background:var(--surface2);transition:transform .15s;}
  .act:active{transform:scale(.88);}
  .act.pass{color:#8d7f6d;}
  .act.like{background:linear-gradient(135deg,#c9a45c,#a07c33);color:#171008;border:none;box-shadow:0 8px 24px rgba(201,164,92,.35);}
  .act.sml{width:46px;height:46px;font-size:17px;color:#7fa3c0;align-self:center;}
  .empty{position:absolute;inset:0;border-radius:24px;border:1px dashed #3a3128;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:13px;text-align:center;padding:30px;}
  .empty .big{font-size:40px;}
  .matchov{position:absolute;inset:0;background:rgba(8,6,4,.94);z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
  .matchov.show{display:flex;}
  .matchov .knot{font-size:56px;margin-bottom:18px;}
  .matchov h2{font-size:25px;color:var(--gold-light);font-weight:800;margin-bottom:10px;}
  .matchov p{color:var(--muted);font-size:13.5px;line-height:1.7;margin-bottom:26px;}
  .matchov .goldbtn{width:auto;padding:14px 36px;border-radius:26px;}

  /* ===== likes / events / chat / my ===== */
  .secthead{padding:2px 20px 12px;font-size:13px;color:var(--muted);flex-shrink:0;}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 12px;overflow-y:auto;}
  .mcell{border-radius:18px;overflow:hidden;position:relative;height:200px;background-size:cover;background-position:center 20%;cursor:pointer;}
  .mcell .gr{position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(10,8,6,.9));}
  .mcell .nm{position:absolute;bottom:10px;left:12px;font-size:13px;font-weight:600;}
  .mcell .st{position:absolute;top:10px;right:10px;font-size:10px;background:rgba(201,164,92,.9);color:#171008;font-weight:700;padding:3px 8px;border-radius:10px;}
  .evbanner{margin:0 16px 14px;background:linear-gradient(135deg,#1f180f,#241b10);border:1px solid rgba(201,164,92,.4);border-radius:14px;padding:12px 14px;font-size:11.5px;color:var(--gold-light);line-height:1.65;flex-shrink:0;}
  .evlist{flex:1;overflow-y:auto;padding:0 16px 12px;}
  .evcard{display:flex;gap:14px;background:var(--surface);border:1px solid #2e2620;border-radius:18px;padding:16px;margin-bottom:12px;position:relative;}
  .evcard.hot{border-color:var(--gold);}
  .evcard .tag{position:absolute;top:-9px;right:14px;background:var(--gold);color:#171008;font-size:10px;font-weight:800;padding:3px 10px;border-radius:10px;}
  .evdate{width:56px;flex-shrink:0;text-align:center;background:var(--surface2);border-radius:12px;padding:10px 4px;height:fit-content;}
  .evdate b{display:block;font-size:15px;color:var(--gold-light);}
  .evdate span{font-size:9.5px;color:var(--muted);}
  .evc{flex:1;min-width:0;}
  .evt{font-size:14.5px;font-weight:700;}
  .evd{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5;}
  .evm{font-size:11px;color:#b3a58f;margin-top:6px;}
  .evbtn{margin-top:10px;width:100%;padding:9px;border-radius:12px;border:none;background:linear-gradient(135deg,#c9a45c,#a07c33);color:#171008;font-weight:700;font-size:12px;cursor:pointer;}
  .evbtn.joined{background:var(--surface2);color:var(--ok);border:1px solid rgba(95,156,122,.45);}
  .clist{overflow-y:auto;flex:1;}
  .citem{display:flex;gap:12px;padding:13px 20px;cursor:pointer;border-bottom:1px solid #1d1812;align-items:center;}
  .avatar{width:52px;height:52px;border-radius:50%;flex-shrink:0;background-size:cover;background-position:center;}
  .citem .cc{flex:1;min-width:0;}
  .citem .cn{font-size:14.5px;font-weight:600;}
  .citem .cm{font-size:12.5px;color:var(--muted);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .citem .ct{font-size:10.5px;color:#6b5f4f;flex-shrink:0;}
  .unread{min-width:18px;height:18px;border-radius:9px;background:var(--gold);color:#171008;font-size:10.5px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px;margin-top:5px;margin-left:auto;}
  .chathead{display:flex;align-items:center;gap:12px;padding:4px 16px 12px;border-bottom:1px solid #221c15;flex-shrink:0;}
  .back{font-size:22px;color:var(--gold);cursor:pointer;padding:4px 8px;}
  .chathead .who{flex:1;}
  .chathead .who b{font-size:15px;}
  .chathead .who span{display:block;font-size:11px;color:var(--ok);}
  .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;}
  .msg{max-width:80%;padding:11px 14px;border-radius:16px;font-size:13.5px;line-height:1.55;}
  .msg.them{background:var(--surface2);border-bottom-left-radius:4px;align-self:flex-start;}
  .msg.me{background:linear-gradient(135deg,#bd9850,#96742f);color:#171008;border-bottom-right-radius:4px;align-self:flex-end;}
  .msg .orig{font-size:11.5px;opacity:.62;margin-top:7px;padding-top:7px;border-top:1px dashed rgba(255,255,255,.25);}
  .msg.me .orig{border-top-color:rgba(0,0,0,.25);}
  .trnote{align-self:center;font-size:10.5px;color:#6b5f4f;}
  .inputrow{display:flex;gap:8px;padding:10px 14px calc(10px + env(safe-area-inset-bottom));border-top:1px solid #221c15;flex-shrink:0;}
  .inputrow input{flex:1;background:var(--surface2);border:1px solid #2e2620;border-radius:22px;padding:12px 16px;color:var(--text);font-size:14px;outline:none;}
  .send{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#c9a45c,#a07c33);border:none;color:#171008;font-size:16px;cursor:pointer;flex-shrink:0;}
  .my{overflow-y:auto;padding:0 20px 20px;flex:1;}
  .myhead{display:flex;align-items:center;gap:16px;padding:6px 0 18px;}
  .myhead .avatar{width:72px;height:72px;}
  .myhead h3{font-size:18px;}
  .myhead .tier{font-size:11px;color:var(--gold);letter-spacing:2px;margin-top:4px;}
  .vcard{background:linear-gradient(135deg,#1d1710,#241c12);border:1px solid rgba(201,164,92,.45);border-radius:18px;padding:16px 18px;margin-bottom:14px;}
  .vcard .vt{font-size:13.5px;font-weight:700;color:var(--gold-light);margin-bottom:6px;}
  .vcard .vs{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px;}
  .vrow{display:flex;justify-content:space-between;align-items:center;padding:13px 2px;border-bottom:1px solid #1d1812;font-size:13.5px;}
  .vrow .lab{color:var(--muted);font-size:12.5px;}
  .vrow.link{cursor:pointer;}
  .tiers{flex:1;overflow-y:auto;padding:0 18px 16px;}
  .tier-card{border-radius:20px;padding:18px;margin-bottom:14px;border:1px solid #2e2620;background:var(--surface);position:relative;}
  .tier-card.hot{border:1.5px solid var(--gold);background:linear-gradient(135deg,#1f180f,#241b10);}
  .tier-card .tn{font-size:15px;font-weight:800;letter-spacing:2px;}
  .tier-card.hot .tn{color:var(--gold-light);}
  .tier-card .tp{font-size:20px;font-weight:800;margin:8px 0 2px;}
  .tier-card .tp small{font-size:12px;color:var(--muted);font-weight:400;}
  .tier-card ul{list-style:none;margin-top:10px;}
  .tier-card li{font-size:12px;color:var(--muted);padding:4px 0 4px 18px;position:relative;line-height:1.5;}
  .tier-card li::before{content:'✦';position:absolute;left:0;color:var(--gold);font-size:10px;top:6px;}
  .tier-card .tag{position:absolute;top:-9px;right:16px;background:var(--gold);color:#171008;font-size:10px;font-weight:800;padding:3px 10px;border-radius:10px;}
  .freenote{background:rgba(95,156,122,.12);border:1px solid rgba(95,156,122,.35);border-radius:14px;padding:14px 16px;font-size:12.5px;color:#a9d4bc;line-height:1.65;margin-bottom:14px;}
  .disc{text-align:center;font-size:9.5px;color:#4d4335;padding:6px 20px;line-height:1.6;flex-shrink:0;}
</style>
</head>
<body>
<div class="shell">

  <!-- ================= ONBOARDING ================= -->
  <div class="onb active" id="onb"><div id="ob" style="display:flex;flex-direction:column;flex:1;min-height:0;"></div></div>

  <!-- ================= APP SCREENS ================= -->
  <div class="screen" id="scr-discover">
    <div class="apptitle"><div><div class="logo">MU<em>SUBI</em></div><div class="sub" id="d-sub"></div></div><div class="icbtn">⚙</div></div>
    <div class="cardwrap" id="cardwrap"><div class="empty" id="empty"><div class="big">🎋</div><div id="empty-txt"></div></div></div>
    <div class="actions">
      <div class="act pass" onclick="swipe(false)">✕</div>
      <div class="act sml">★</div>
      <div class="act like" onclick="swipe(true)">♥</div>
    </div>
  </div>

  <div class="screen" id="scr-likes">
    <div class="apptitle"><div class="logo" id="l-title"></div><div class="icbtn">↻</div></div>
    <div class="secthead" id="l-head"></div>
    <div class="mgrid" id="l-grid"></div>
  </div>

  <div class="screen" id="scr-events">
    <div class="apptitle"><div class="logo" id="e-title"></div><div class="icbtn">🗓</div></div>
    <div class="evbanner" id="e-banner"></div>
    <div class="evlist" id="e-list"></div>
  </div>

  <div class="screen" id="scr-chats">
    <div class="apptitle"><div class="logo" id="c-title"></div><div class="icbtn">✎</div></div>
    <div class="clist" id="c-list"></div>
  </div>

  <div class="screen full" id="scr-room">
    <div class="chathead">
      <div class="back" onclick="showScreen('scr-chats')">‹</div>
      <div class="avatar" id="r-avatar" style="width:42px;height:42px;"></div>
      <div class="who"><b id="r-name"></b><span id="r-status"></span></div>
      <div class="icbtn">📞</div>
    </div>
    <div class="msgs" id="msgs"></div>
    <div class="inputrow"><input id="minput" onkeydown="if(event.key==='Enter')sendMsg()"><button class="send" onclick="sendMsg()">↑</button></div>
  </div>

  <div class="screen" id="scr-my">
    <div class="apptitle"><div class="logo" id="m-title"></div><div class="icbtn">⚙</div></div>
    <div class="my" id="m-body"></div>
  </div>

  <div class="screen" id="scr-tier">
    <div class="chathead" style="border-bottom:none;">
      <div class="back" onclick="showScreen('scr-my')">‹</div>
      <div class="who"><b id="t-title"></b></div>
    </div>
    <div class="tiers" id="t-body"></div>
  </div>

  <div class="matchov" id="matchov">
    <div class="knot">🎀</div><h2 id="match-h"></h2><p id="matchname"></p>
    <button class="goldbtn" onclick="toMsg()" id="match-btn"></button>
    <button class="ghostbtn" onclick="hideMatch()" id="match-skip"></button>
  </div>

    seq.push({t:sc[s].it[r][0],rev:sc[s].it[r][1],scale:sc[s].c,idx:r,kind:"c"});
  SD[lang].forEach((t,k)=>seq.splice(9+k*10,0,{t,kind:"sd",idx:k}));
  seq.splice(24,0,{t:INF[lang][0],kind:"inf",idx:0});
  seq.splice(48,0,{t:INF[lang][1],kind:"inf",idx:1});
  INC[v].forEach((o,k)=>seq.push({t:o.q,kind:"inc",idx:k}));
  return seq;
}
function startTest(){SEQ=buildSeq(VER);ANS=new Array(SEQ.length).fill(0);pos=0;renderQ();}
function renderQ(){
  const t=T(),q=SEQ[pos],pct=40+Math.round(pos/SEQ.length*45);
  $('ob').innerHTML=`<div class="prog"><div class="bar" style="width:${pct}%"></div></div>
  <div class="pnum">${pos+1} / ${SEQ.length}</div>
  <div class="qtext">${q.t}</div>
  <div class="obody"><div class="lik">${t.likert.map((l,k)=>`
    <div class="lk ${ANS[pos]===k+1?'sel':''}" onclick="pick(${k+1})"><span class="n">${k+1}</span>${l}</div>`).join('')}</div>
  <button class="backlink" onclick="backQ()" ${pos===0?'style="visibility:hidden"':''}>${t.back}</button></div>`;
}
function pick(v){ANS[pos]=v;setTimeout(()=>{if(pos<SEQ.length-1){pos++;renderQ();}else score();},140);}
function backQ(){if(pos>0){pos--;renderQ();}}

function score(){
  const sc=SCALES[VER],t=T();
  const scores=sc.map(s=>{
    const vals=SEQ.map((q,i)=>q.kind==="c"&&q.scale===s.c?(q.rev?6-ANS[i]:ANS[i]):null).filter(x=>x!==null);
    return {c:s.c,n:s.n,cut:s.cut,gate:s.gate,mean:vals.reduce((a,b)=>a+b,0)/vals.length};
  });
  const sdHi=SEQ.filter((q,i)=>q.kind==="sd"&&ANS[i]>=4).length;
  const infHi=SEQ.filter((q,i)=>q.kind==="inf"&&ANS[i]>=4).length;
  const incFlags=INC[VER].map((o,k)=>{
    const vIdx=SEQ.findIndex(q=>q.kind==="inc"&&q.idx===k);
    const refItem=SCALES[VER].find(s=>s.c===o.ref[0]).it[o.ref[1]];
    const refIdx=SEQ.findIndex(q=>q.kind==="c"&&q.scale===o.ref[0]&&q.idx===o.ref[1]);
    const refKeyed=refItem[1]?6-ANS[refIdx]:ANS[refIdx];
    const vKeyed=o.dir===-1?6-ANS[vIdx]:ANS[vIdx];
    return Math.abs(vKeyed-refKeyed)>=2;
  });
  const invalid=sdHi>=5||infHi>=1||incFlags.every(x=>x);
  const gateFails=scores.filter(s=>s.gate===1&&s.mean<s.cut).length;
  const safeFail=scores.some(s=>s.gate===2&&s.mean<s.cut);
  let verdict;
  if(invalid)verdict="invalid";
  else if(safeFail)verdict="safefail";
  else if(gateFails>=2)verdict="fail";
  else if(gateFails===1||sdHi===4)verdict="hold";
  else verdict="pass";
  RESULT={scores,verdict,sdHi,infHi,incN:incFlags.filter(x=>x).length,date:new Date().toISOString().slice(0,10)};
  resultScreen();
}
function resultScreen(){
  const t=T(),r=RESULT;
  const vmap={pass:["v-pass",...t.vPass],hold:["v-hold",...t.vHold],fail:["v-fail",...t.vFail],safefail:["v-fail",...t.vSafe],invalid:["v-hold",...t.vInv]};
  const[cls,ti,de]=vmap[r.verdict];
  const ok=r.verdict==="pass"||r.verdict==="hold";
  $('ob').innerHTML=`<div class="prog"><div class="bar" style="width:90%"></div></div>
  <div class="step">STEP 4 / 5</div><h2>${t.resTitle}</h2>
  <div class="obody">
  <div class="verdict ${cls}">${ti}<small>${de}</small></div>
  ${r.scores.map(s=>{
    const pass=s.mean>=s.cut;
    const pill=s.gate===0?(pass?`<span class="pill p-ok">${t.evOk}</span>`:`<span class="pill p-warn">${t.evNo}</span>`)
      :(pass?`<span class="pill p-ok">${t.pass}</span>`:(s.gate===2?`<span class="pill p-bad">${t.safeMiss}</span>`:`<span class="pill p-warn">${t.miss}</span>`));
    return `<div class="scrow"><div class="st1"><span>${s.n}${pill}</span><span class="sv">${s.mean.toFixed(2)}</span></div>
      <div class="sbar"><div class="sfill" style="width:${(s.mean-1)/4*100}%;background:${pass?'linear-gradient(90deg,#8fae7c,#5f9c7a)':'linear-gradient(90deg,#b0564f,#8a423d)'}"></div>
      <div class="cut" style="left:${(s.cut-1)/4*100}%"></div></div>
      <div class="st2"><span>1.0</span><span>${t.cutLab} ${s.cut}</span><span>5.0</span></div></div>`;}).join('')}
  <div class="vflag">${t.vlab(r.sdHi,r.infHi,r.incN)}</div></div>
  <div class="ofoot">${ok?`<button class="goldbtn" onclick="ivStep()">${t.toIv}</button>`
    :r.verdict==="invalid"?`<button class="goldbtn" onclick="startTest()">${t.retry}</button>`
    :`<button class="goldbtn" onclick="location.reload()">${t.restart}</button>`}
  </div>`;
}
function ivStep(){
  const t=T();slotSel=-1;renderIv();
}
function renderIv(){
  const t=T();
  $('ob').innerHTML=`<div class="prog"><div class="bar" style="width:95%"></div></div>
  <div class="step">STEP 5 / 5</div><h2>${t.ivTitle}</h2><div class="desc">${t.ivDesc}</div>
  <div class="obody">
    <div class="drcard"><span class="em">🎥</span><span><b>${t.ivCard}</b><span>${t.ivCardD}</span></span></div>
    ${t.slots.map((s,k)=>`<div class="slot ${slotSel===k?'sel':''}" onclick="slotSel=${k};renderIv()"><b>${s[0]}</b><span>${s[1]}</span></div>`).join('')}
  </div>
  <div class="ofoot"><button class="goldbtn" onclick="doneStep()" ${slotSel<0?'disabled':''}>${t.ivBook}</button></div>`;
}
function doneStep(){
  const t=T();save();
  $('ob').innerHTML=`<div class="prog"><div class="bar" style="width:100%"></div></div>
  <div class="obody" style="display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
    <div style="font-size:52px;margin-bottom:18px;">✦</div>
    <h2>${t.doneTitle}</h2>
    <div class="desc" style="margin-top:10px;">${t.doneDesc}</div></div>
  <div class="ofoot"><button class="goldbtn" onclick="enterApp()">${t.enter}</button></div>`;
}
function demoEnter(v){
  VER=v;LANG=v==='m'?'kr':'jp';
  RESULT={scores:SCALES[v].map(s=>({c:s.c,n:s.n,cut:s.cut,gate:s.gate,mean:4.1})),verdict:"pass",sdHi:1,infHi:0,incN:0,date:new Date().toISOString().slice(0,10)};
  save();enterApp();
}

/* ---------------- 메인 앱 ---------------- */
function enterApp(){
  $('onb').classList.remove('active');
  $('tabbar').classList.add('on');
  renderApp();showScreen('scr-discover');setTab('scr-discover');
}
function renderApp(){
  const t=T();idx=0;
  $('d-sub').textContent=t.sub;
  document.querySelectorAll('.tab .tl').forEach((e,k)=>e.textContent=t.tabs[k]);
  $('empty-txt').innerHTML=t.empty;
  $('l-title').innerHTML=t.likesTitle;$('l-head').innerHTML=t.likesHead;
  $('l-grid').innerHTML=t.likes.map(x=>`<div class="mcell" style="background-image:url('${x.ph}')"><div class="gr"></div>${x.st?`<div class="st">${x.st}</div>`:''}<div class="nm">${x.n}</div></div>`).join('');
  $('c-title').innerHTML=t.chatTitle;
  $('c-list').innerHTML=t.chats.map(c=>`
    <div class="citem" ${c.open?'onclick="showScreen(\'scr-room\')"':''}>
      <div class="avatar" style="background-image:url('${c.ph}')"></div>
      <div class="cc"><div class="cn">${c.n} <span style="font-size:10px;color:var(--gold)">✦</span></div><div class="cm">${c.m}</div></div>
      <div style="text-align:right"><div class="ct">${c.t}</div>${c.u?`<div class="unread">${c.u}</div>`:''}</div></div>`).join('');
  const R=t.room;
  $('r-avatar').style.backgroundImage=`url('${R.ph}')`;
  $('r-name').textContent=R.n;$('r-status').textContent=R.s;
  $('msgs').innerHTML=`<div class="trnote">${R.note}</div>`+R.msgs.map(m=>`<div class="msg ${m.who}">${m.t}<div class="orig">${m.o}</div></div>`).join('');
  $('minput').placeholder=t.ph;
  renderMy();
  $('t-title').textContent=t.tierTitle;$('t-body').innerHTML=t.tiers;
  const soc=RESULT.scores.find(s=>s.gate===0);
  $('e-title').innerHTML=t.evTitle;$('e-banner').innerHTML=t.evBanner(soc.mean.toFixed(1));
  $('e-list').innerHTML=t.events.map(e=>`
    <div class="evcard ${e.hot?'hot':''}">${e.hot?`<div class="tag">${t.evHot}</div>`:''}
      <div class="evdate"><b>${e.d1}</b><span>${e.d2}</span></div>
      <div class="evc"><div class="evt">${e.t}</div><div class="evd">${e.desc}</div>
        <div class="evm">📍 ${e.city} · 👥 ${e.m}</div><div class="evm">✦ ${e.cond} · 💳 ${e.price}</div>
        <button class="evbtn" onclick="this.textContent='${t.evJoin[1]}';this.classList.add('joined')">${t.evJoin[0]}</button></div></div>`).join('');
  $('match-h').textContent=t.matchH;$('match-btn').textContent=t.matchBtn;$('match-skip').textContent=t.matchSkip;
  renderCards();
}
function renderMy(){
  const t=T(),r=RESULT;
  const vt=r.verdict==="pass"?"PASS":r.verdict==="hold"?(LANG==='kr'?"조건부":"条件付き"):"—";
  $('m-title').innerHTML=t.myTitle;
  $('m-body').innerHTML=`
    <div class="myhead"><div class="avatar" style="background-image:url('${t.myPh}')"></div>
      <div><h3>${t.myName} · ${t.myLoc}</h3><div class="tier">${t.myTier(vt)}</div></div></div>
    <div class="vcard"><div class="vt">${t.myCard[0]} <span style="float:right">✦</span></div><div class="vs">${t.myCard[1]} (${r.date})</div>
      ${r.scores.map(s=>{const pass=s.mean>=s.cut;
        return `<div class="scrow"><div class="st1"><span>${s.n}${pass?`<span class="pill p-ok">${t.pass}</span>`:`<span class="pill p-warn">${t.miss}</span>`}</span><span class="sv">${s.mean.toFixed(2)}</span></div>
        <div class="sbar"><div class="sfill" style="width:${(s.mean-1)/4*100}%;background:linear-gradient(90deg,#8fae7c,#5f9c7a)"></div><div class="cut" style="left:${(s.cut-1)/4*100}%"></div></div></div>`;}).join('')}
    </div>
    ${t.rows.map(x=>`<div class="vrow"><span class="lab">${x[0]}</span><span class="pill p-ok">${x[1]}</span></div>`).join('')}
    <div class="vrow link" onclick="showScreen('scr-tier')"><span class="lab">${t.memRow[0]}</span><span style="color:var(--gold);font-size:13px">${t.memRow[1]}</span></div>
    <div class="vrow"><span class="lab">${t.likeRow[0]}</span><span style="font-size:13px">${t.likeRow[1]}</span></div>
    <button class="ghostbtn" onclick="reset()" style="color:#8d7f6d;">${t.redo}</button>`;
}
function renderCards(){
  const t=T(),wrap=$('cardwrap');
  wrap.querySelectorAll('.pcard').forEach(e=>e.remove());
  for(let k=Math.min(idx+1,t.profiles.length-1);k>=idx;k--){
    if(k>=t.profiles.length)continue;
    const p=t.profiles[k],d=document.createElement('div');
    d.className='pcard';d.id='card'+k;
    if(k>idx){d.style.transform='scale(.95) translateY(10px)';d.style.filter='brightness(.6)';}
    d.innerHTML=`<div class="photo" style="background-image:url('${p.ph}')"></div><div class="grad"></div>
      <div class="vbadge">${t.vbadge}</div>
      <div class="pinfo"><h2>${p.n}<span class="age">${p.a}</span></h2><div class="loc">📍 ${p.l}</div>
      <div class="chips">${p.c.map(x=>`<span class="chip ${x[1]?'score':''}">${x[0]}</span>`).join('')}</div></div>`;
    wrap.appendChild(d);
  }
  $('empty').style.display=idx>=t.profiles.length?'flex':'none';
}
function swipe(like){
  const t=T();
  if(idx>=t.profiles.length)return;
  const card=$('card'+idx),name=t.profiles[idx].n;
  card.classList.add(like?'gone-r':'gone-l');
  idx++;
  setTimeout(()=>{renderCards();
    if(like&&Math.random()<0.6){$('matchname').innerHTML=t.matchP(name);$('matchov').classList.add('show');}},320);
}
function hideMatch(){$('matchov').classList.remove('show');}
function toMsg(){hideMatch();showScreen('scr-chats');setTab('scr-chats');}
function go(el){setTab(el.dataset.s);showScreen(el.dataset.s);}
function setTab(s){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.s===s));}
function showScreen(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(s).classList.add('active');}
function sendMsg(){
  const inp=$('minput');if(!inp.value.trim())return;
  const m=document.createElement('div');m.className='msg me';
  m.innerHTML=inp.value+`<div class="orig">${T().sendNote}</div>`;
  $('msgs').appendChild(m);inp.value='';$('msgs').scrollTop=99999;
}

/* ---------------- 부팅 ---------------- */
const saved=load();
if(saved&&saved.RESULT&&(saved.RESULT.verdict==="pass"||saved.RESULT.verdict==="hold")){
  VER=saved.VER;LANG=saved.LANG;RESULT=saved.RESULT;enterApp();
}else{splash();}
