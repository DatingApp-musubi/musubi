<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0b09">
<title>MUSUBI 무스비 — 結び</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.4/kakao.min.js"></script>
<style>
  :root{--bg:#0d0b09;--surface:#171310;--surface2:#211b16;--gold:#c9a45c;--gold-light:#e6cf9a;
    --text:#f2ece1;--muted:#9c8f7d;--danger:#d99790;--ok:#8fc6a8;}
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Apple SD Gothic Neo','Noto Sans KR','Hiragino Sans','Pretendard',sans-serif;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{background:#060504;display:flex;justify-content:center;color:var(--text);}
  .shell{width:100%;max-width:480px;height:100dvh;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.8);}
  .screen{position:absolute;inset:0;padding:max(16px,env(safe-area-inset-top)) 0 86px;display:none;flex-direction:column;overflow:hidden;}
  .screen.active{display:flex;}
  .full{padding-bottom:0!important;}
  .langsw{position:absolute;top:max(12px,env(safe-area-inset-top));right:12px;z-index:95;display:flex;background:rgba(23,19,16,.92);border:1px solid #3a3128;border-radius:20px;padding:3px;backdrop-filter:blur(6px);}
  .langsw button{border:none;background:none;color:var(--muted);font-size:11px;padding:5px 11px;border-radius:16px;cursor:pointer;font-weight:700;}
  .langsw button.on{background:linear-gradient(135deg,#c9a45c,#a07c33);color:#171008;}
  .apptitle{padding-right:150px!important;}
  .chathead{padding-right:150px!important;}
  .onb{position:absolute;inset:0;background:var(--bg);z-index:70;display:none;flex-direction:column;
    padding:max(28px,env(safe-area-inset-top)) 24px 28px;overflow-y:auto;}
  .onb.active{display:flex;}
  .step{font-size:11px;color:var(--gold);letter-spacing:3px;margin-bottom:10px;}
  .onb h2{font-size:21px;font-weight:800;line-height:1.45;margin-bottom:8px;}
  .desc{font-size:13px;color:var(--muted);line-height:1.75;margin-bottom:20px;}
  .obody{flex:1;}
  .ofoot{padding-top:16px;}
  .goldbtn{width:100%;background:linear-gradient(135deg,#c9a45c,#a07c33);color:#171008;font-weight:700;font-size:15px;border:none;border-radius:14px;padding:15px;cursor:pointer;}
  .goldbtn:disabled{opacity:.35;}
  .ghostbtn{width:100%;background:none;border:none;color:var(--muted);font-size:13px;margin-top:14px;cursor:pointer;text-decoration:underline;}
  .splash{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .splash .mark{font-size:56px;margin-bottom:16px;}
  .splash .bn{font-size:34px;font-weight:800;letter-spacing:3px;}
  .splash .bn em{color:var(--gold);font-style:normal;}
  .splash .bs{font-size:12px;color:var(--muted);letter-spacing:5px;margin-top:8px;}
  .splash .tg{font-size:14px;color:var(--muted);margin-top:28px;line-height:1.85;}
  .verbtn{display:flex;align-items:center;gap:14px;width:100%;background:var(--surface2);border:1.5px solid #3a3128;border-radius:16px;padding:18px;cursor:pointer;margin-bottom:12px;text-align:left;color:var(--text);}
  .verbtn .ic{font-size:28px;}
  .verbtn b{display:block;font-size:15.5px;margin-bottom:3px;}
  .verbtn span{font-size:12px;color:var(--muted);line-height:1.5;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;}
  .field input,.field textarea{width:100%;background:var(--surface2);border:1.5px solid #3a3128;border-radius:12px;padding:13px 14px;color:var(--text);font-size:14.5px;outline:none;}
  .field input:focus,.field textarea:focus{border-color:var(--gold);}
  .err{font-size:12.5px;color:var(--danger);margin:6px 0 0;line-height:1.5;min-height:18px;}
  .socialbtn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border-radius:14px;padding:14px;font-size:14px;font-weight:700;border:none;cursor:pointer;margin-bottom:10px;}
  .sb-google{background:#fff;color:#1a1a1a;}
  .sb-kakao{background:#FEE500;color:#191919;}
  .ordiv{display:flex;align-items:center;gap:12px;color:#6b5f4f;font-size:11px;margin:18px 0 14px;}
  .ordiv::before,.ordiv::after{content:'';flex:1;height:1px;background:#2e2620;}
  .photopick{width:130px;height:130px;border-radius:50%;background:var(--surface2);border:2px dashed #3a3128;margin:6px auto 14px;
    display:flex;align-items:center;justify-content:center;font-size:34px;cursor:pointer;background-size:cover;background-position:center;color:#6b5f4f;}
  .photopick.has{border-style:solid;border-color:var(--gold);color:transparent;}
  .prog{height:5px;background:#241d15;border-radius:3px;margin-bottom:8px;overflow:hidden;flex-shrink:0;}
  .prog .bar{height:100%;background:linear-gradient(90deg,#c9a45c,#e6cf9a);border-radius:3px;transition:width .25s;}
  .loveprog{margin-bottom:18px;flex-shrink:0;padding-top:10px;}
  .lp-track{position:relative;height:10px;background:#241d15;border-radius:6px;}
  .lp-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,#c9a45c,#e88ca0);transition:width .25s;}
  .lp-walker{position:absolute;top:-14px;transform:translateX(-55%);font-size:20px;transition:left .25s;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));}
  .lp-goal{position:absolute;right:-4px;top:-14px;font-size:20px;}
  .lp-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-top:10px;}
  .lp-meta b{color:var(--gold-light);font-weight:600;}
  .pnum{font-size:11px;color:var(--muted);text-align:right;margin-bottom:16px;}
  .qtext{font-size:17.5px;line-height:1.7;min-height:92px;margin-bottom:20px;font-weight:600;}
  .lik{display:flex;flex-direction:column;gap:9px;}
  .lk{display:flex;align-items:center;gap:12px;border:1.5px solid #3a3128;background:var(--surface2);border-radius:14px;padding:14px 16px;cursor:pointer;font-size:14px;}
  .lk.sel{border-color:var(--gold);background:rgba(201,164,92,.15);}
  .lk .n{width:26px;height:26px;border-radius:50%;background:#2a231c;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--gold-light);flex-shrink:0;}
  .backlink{background:none;border:none;color:var(--muted);font-size:13px;margin-top:16px;cursor:pointer;}
  .docrow{display:flex;align-items:center;gap:12px;border:1px solid #2e2620;border-radius:14px;padding:15px;margin-bottom:10px;background:var(--surface);cursor:pointer;}
  .docrow .di{width:40px;height:40px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .docrow .dn{font-size:13.5px;font-weight:600;}
  .docrow .ds{font-size:11px;color:var(--muted);margin-top:2px;}
  .docrow .dst{font-size:11px;color:#6b5f4f;font-weight:700;margin-left:auto;flex-shrink:0;}
  .docrow.up{border-color:rgba(95,156,122,.5);}
  .docrow.up .dst{color:var(--ok);}
  .slot{border:1.5px solid #3a3128;background:var(--surface2);border-radius:14px;padding:15px;margin-bottom:10px;cursor:pointer;font-size:14px;display:flex;justify-content:space-between;}
  .slot.sel{border-color:var(--gold);background:rgba(201,164,92,.15);}
  .slot span{color:var(--muted);font-size:12px;}
  .drcard{border:1px solid rgba(201,164,92,.4);border-radius:16px;padding:16px;background:linear-gradient(135deg,#1d1710,#241c12);display:flex;gap:14px;align-items:center;margin-bottom:16px;}
  .drcard .em{font-size:30px;}
  .drcard b{font-size:13.5px;display:block;margin-bottom:4px;}
  .drcard span{font-size:11.5px;color:var(--muted);line-height:1.55;}
  .verdict{border-radius:16px;padding:18px;text-align:center;margin-bottom:18px;font-weight:800;font-size:16.5px;}
  .v-pass{background:rgba(95,156,122,.15);border:1px solid rgba(95,156,122,.5);color:var(--ok);}
  .v-hold{background:rgba(201,164,92,.12);border:1px solid rgba(201,164,92,.5);color:var(--gold-light);}
  .v-fail{background:rgba(176,86,79,.13);border:1px solid rgba(176,86,79,.5);color:var(--danger);}
  .verdict small{display:block;font-weight:400;font-size:12px;margin-top:8px;line-height:1.6;opacity:.85;}
  .scrow{margin-bottom:14px;}
  .st1{display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:5px;align-items:center;}
  .st1 .sv{font-weight:800;color:var(--gold-light);}
  .sbar{height:8px;background:#241d15;border-radius:4px;position:relative;}
  .sfill{height:100%;border-radius:4px;}
  .cut{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--danger);}
  .st2{display:flex;justify-content:space-between;font-size:10px;color:#6b5f4f;margin-top:3px;}
  .pill{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:800;margin-left:6px;}
  .p-ok{background:rgba(95,156,122,.2);color:var(--ok);}
  .p-warn{background:rgba(201,164,92,.2);color:var(--gold-light);}
  .p-bad{background:rgba(176,86,79,.2);color:var(--danger);}
  .vflag{font-size:12px;line-height:1.7;color:var(--muted);border-top:1px dashed #2e2620;padding-top:12px;margin:8px 0 14px;}
  .typecard{background:linear-gradient(150deg,#241c12,#17110b);border:1.5px solid var(--gold);border-radius:22px;padding:22px 20px 18px;margin-bottom:18px;text-align:center;}
  .tcode{display:flex;justify-content:center;align-items:center;gap:8px;}
  .tcode span{font-size:9px;letter-spacing:3px;color:var(--muted);}
  .tcode b{font-size:18px;letter-spacing:2px;background:linear-gradient(135deg,#c9a45c,#a07c33);color:#171008;padding:3px 14px;border-radius:8px;}
  .te{font-size:46px;margin-top:12px;line-height:1;}
  .tn2{font-size:21px;font-weight:800;color:var(--gold-light);margin-top:8px;}
  .tbul{list-style:none;text-align:left;margin:14px 2px 0;}
  .tbul li{font-size:12.5px;color:#cbbfa9;line-height:1.65;padding:2px 0;}
  .tbul li.warn{color:var(--danger);}
  .tquote{margin:14px auto 10px;background:#2a231c;border-radius:16px;padding:11px 16px;font-size:13px;color:var(--gold-light);display:inline-block;line-height:1.6;}
  .tm{margin-top:12px;font-size:11.5px;color:#a9d4bc;border-top:1px dashed #2e2620;padding-top:12px;line-height:1.7;}
  .tabbar{position:absolute;bottom:0;left:0;right:0;height:calc(72px + env(safe-area-inset-bottom));padding-bottom:env(safe-area-inset-bottom);background:rgba(13,11,9,.97);border-top:1px solid #2a231c;display:none;z-index:40;}
  .tabbar.on{display:flex;}
  .tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:#6b5f4f;font-size:10px;}
  .tab svg{width:23px;height:23px;fill:none;stroke:currentColor;stroke-width:1.7;}
  .tab.on{color:var(--gold);}
  .apptitle{display:flex;align-items:center;justify-content:space-between;padding:8px 20px 12px;flex-shrink:0;}
  .apptitle .logo{font-weight:800;font-size:19px;letter-spacing:1px;}
  .apptitle .logo em{color:var(--gold);font-style:normal;}
  .apptitle .sub{font-size:10px;color:var(--muted);letter-spacing:2px;}
  .icbtn{width:34px;height:34px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--gold);cursor:pointer;font-size:15px;}
  .cardwrap{flex:1;position:relative;margin:0 16px 8px;}
  .pcard{position:absolute;inset:0;border-radius:24px;overflow:hidden;background:var(--surface);border:1px solid #2e2620;box-shadow:0 18px 40px rgba(0,0,0,.5);transition:transform .35s ease,opacity .35s ease;}
  .pcard.gone-l{transform:translateX(-120%) rotate(-8deg);opacity:0;}
  .pcard.gone-r{transform:translateX(120%) rotate(8deg);opacity:0;}
  .photo{position:absolute;inset:0;background-size:cover;background-position:center 20%;background-color:#241d15;}
  .grad{position:absolute;inset:0;background:linear-gradient(180deg,transparent 45%,rgba(10,8,6,.93) 100%);}
  .vbadge{position:absolute;top:16px;left:16px;background:rgba(13,11,9,.75);border:1px solid var(--gold);color:var(--gold-light);font-size:11px;padding:5px 10px;border-radius:20px;backdrop-filter:blur(4px);}
  .dbadge{position:absolute;top:16px;right:16px;background:rgba(13,11,9,.75);border:1px solid #555;color:#999;font-size:10px;padding:4px 9px;border-radius:20px;}
  .tbadge{position:absolute;top:16px;right:16px;background:linear-gradient(135deg,#c9a45c,#a07c33);color:#171008;font-size:11.5px;font-weight:800;padding:6px 12px;border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,.45);}
  .tytabs{display:flex;gap:8px;margin-bottom:14px;}
  .tytab{flex:1;padding:11px;border-radius:12px;border:1px solid #3a3128;background:var(--surface);color:var(--muted);font-size:13px;cursor:pointer;font-weight:700;}
  .tytab.on{border-color:var(--gold);color:var(--gold-light);background:rgba(201,164,92,.1);}
  .tygrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px;}
  .tymini{background:var(--surface);border:1px solid #2e2620;border-radius:14px;padding:13px 8px;text-align:center;cursor:pointer;}
  .tymini:active{border-color:var(--gold);}
  .tymini .e{font-size:28px;line-height:1;}
  .tymini b{display:block;font-size:12.5px;margin-top:6px;}
  .tymini span{font-size:9.5px;color:var(--muted);letter-spacing:1px;}
  .cmblabel{font-size:11px;color:var(--muted);margin-top:14px;letter-spacing:1px;}
  .cmbrow{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px;}
  .cmbchip{border:1px solid #3a3128;background:var(--surface2);color:var(--gold-light);font-size:10.5px;font-weight:800;padding:5px 9px;border-radius:12px;cursor:pointer;letter-spacing:1px;}
  .cmbchip:active{border-color:var(--gold);}
  .combocard{margin-top:12px;background:#14100b;border:1px dashed rgba(201,164,92,.5);border-radius:16px;padding:16px;text-align:center;}
  .vidbtn{width:100%;padding:12px;border-radius:12px;border:1.5px dashed #3a3128;background:none;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:14px;}
  .vidbtn.has{border-style:solid;border-color:rgba(95,156,122,.6);color:var(--ok);}
  .vidov{position:absolute;inset:0;background:rgba(0,0,0,.93);z-index:85;display:none;align-items:center;justify-content:center;}
  .vidov.show{display:flex;}
  .vidov video{width:92%;max-height:72%;border-radius:18px;background:#000;}
  .vidclose{position:absolute;top:max(18px,env(safe-area-inset-top));left:18px;font-size:22px;color:#fff;cursor:pointer;}
  .vplay{position:absolute;right:16px;bottom:150px;width:48px;height:48px;border-radius:50%;background:rgba(13,11,9,.75);border:1.5px solid var(--gold);color:var(--gold-light);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;backdrop-filter:blur(4px);}
  .prevov{position:absolute;inset:0;background:rgba(6,5,4,.97);z-index:88;display:none;}
  .prevov.show{display:block;}
  .prevnote{position:absolute;top:max(16px,env(safe-area-inset-top));left:0;right:0;text-align:center;font-size:12.5px;color:var(--gold-light);letter-spacing:.5px;}
  .prevov .pcard{position:absolute;left:16px;right:16px;top:52px;bottom:96px;}
  .prevclose{position:absolute;bottom:24px;left:16px;right:16px;width:auto;}
  .pinfo{position:absolute;left:20px;right:20px;bottom:18px;}
  .pinfo h2{font-size:24px;font-weight:700;}
  .pinfo h2 .age{font-size:19px;font-weight:400;color:#d8cdbb;margin-left:8px;}
  .loc{font-size:12.5px;color:#cbbfa9;margin-top:5px;}
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
  .chip{font-size:11px;padding:4px 10px;border-radius:14px;background:rgba(201,164,92,.16);border:1px solid rgba(201,164,92,.4);color:var(--gold-light);}
  .chip.score{background:rgba(95,156,122,.16);border-color:rgba(95,156,122,.45);color:#a9d4bc;}
  .actions{display:flex;justify-content:center;gap:26px;padding:12px 0 4px;flex-shrink:0;}
  .act{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:24px;border:1px solid #332b22;background:var(--surface2);transition:transform .15s;}
  .act:active{transform:scale(.88);}
  .act.pass{color:#8d7f6d;}
  .act.like{background:linear-gradient(135deg,#c9a45c,#a07c33);color:#171008;border:none;box-shadow:0 8px 24px rgba(201,164,92,.35);}
  .act.sml{width:46px;height:46px;font-size:17px;color:#7fa3c0;align-self:center;}
  .empty{position:absolute;inset:0;border-radius:24px;border:1px dashed #3a3128;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:13px;text-align:center;padding:30px;}
  .empty .big{font-size:40px;}
  .matchov{position:absolute;inset:0;background:rgba(8,6,4,.94);z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;}
  .matchov.show{display:flex;}
  .matchov .knot{font-size:56px;margin-bottom:18px;}
  .matchov h2{font-size:25px;color:var(--gold-light);font-weight:800;margin-bottom:10px;}
  .matchov p{color:var(--muted);font-size:13.5px;line-height:1.7;margin-bottom:26px;}
  .matchov .goldbtn{width:auto;padding:14px 36px;border-radius:26px;}
  .repbtn{width:100%;padding:13px;border-radius:12px;border:1px solid #3a3128;background:var(--surface2);color:var(--text);font-size:13.5px;cursor:pointer;margin-bottom:8px;font-family:inherit;}
  .selchip{display:inline-block;padding:6px 11px;border-radius:14px;border:1px solid #3a3128;background:var(--surface2);color:var(--muted);font-size:11.5px;cursor:pointer;margin:0 6px 6px 0;user-select:none;}
  .selchip.on{background:var(--gold);color:#171008;border-color:var(--gold);font-weight:700;}
  .icechip{padding:10px 14px;border:1px dashed var(--gold);border-radius:16px;color:var(--gold-light);font-size:12.5px;margin-bottom:8px;cursor:pointer;background:rgba(201,164,92,.07);line-height:1.5;}
  .repbtn.danger{border-color:rgba(176,86,79,.55);color:var(--danger);}
  .pinfo .rep{margin-left:10px;color:#7d7060;cursor:pointer;font-size:14px;}
  .secthead{padding:2px 20px 12px;font-size:13px;color:var(--muted);flex-shrink:0;}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px 12px;overflow-y:auto;}
  .mcell{border-radius:18px;overflow:hidden;position:relative;height:200px;background-size:cover;background-position:center 20%;background-color:#241d15;cursor:pointer;}
  .mcell .gr{position:absolute;inset:0;background:linear-gradient(180deg,transparent 50%,rgba(10,8,6,.9));}
  .mcell .nm{position:absolute;bottom:10px;left:12px;font-size:13px;font-weight:600;}
  .mcell .st{position:absolute;top:10px;right:10px;font-size:10px;background:rgba(201,164,92,.9);color:#171008;font-weight:700;padding:3px 8px;border-radius:10px;}
  .gempty{grid-column:1/-1;text-align:center;color:var(--muted);font-size:13px;padding:60px 30px;line-height:1.8;border:1px dashed #3a3128;border-radius:18px;}
  .evbanner{margin:0 16px 14px;background:linear-gradient(135deg,#1f180f,#241b10);border:1px solid rgba(201,164,92,.4);border-radius:14px;padding:12px 14px;font-size:11.5px;color:var(--gold-light);line-height:1.65;flex-shrink:0;}
  .evlist{flex:1;overflow-y:auto;padding:0 16px 12px;}
  .evcard{display:flex;gap:14px;background:var(--surface);border:1px solid #2e2620;border-radius:18px;padding:16px;margin-bottom:12px;position:relative;}
  .evcard.hot{border-color:var(--gold);}
  .evcard .tag{position:absolute;top:-9px;right:14px;background:var(--gold);color:#171008;font-size:10px;font-weight:800;padding:3px 10px;border-radius:10px;}
  .evdate{width:56px;flex-shrink:0;text-align:center;background:var(--surface2);border-radius:12px;padding:10px 4px;height:fit-content;}
  .evdate b{display:block;font-size:15px;color:var(--gold-light);}
  .evdate span{font-size:9.5px;color:var(--muted);}
  .evc{flex:1;min-width:0;}
  .evt{font-size:14.5px;font-weight:700;}
  .evd{font-size:11.5px;color:var(--muted);margin-top:4px;line-height:1.5;}

/* ---------------- 브라우저 내 자동 트랜스코딩 (H.264 720p) ---------------- */
async function getFF(){
  if(window.__ff)return window.__ff;
  const [{FFmpeg},util]=await Promise.all([
    import('https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/+esm'),
    import('https://cdn.jsdelivr.net/npm/@ffmpeg/util@0.12.1/+esm')
  ]);
  window.__ffutil=util;
  const ff=new FFmpeg();
  const base='https://cdn.jsdelivr.net/npm/@ffmpeg/core@0.12.6/dist/esm';
  await ff.load({
    coreURL:await util.toBlobURL(base+'/ffmpeg-core.js','text/javascript'),
    wasmURL:await util.toBlobURL(base+'/ffmpeg-core.wasm','application/wasm'),
    classWorkerURL:await util.toBlobURL('https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.10/dist/esm/worker.js','text/javascript')
  });
  window.__ff=ff;
  return ff;
}
async function transcodeVideo(file,onProgress){
  const ff=await getFF();
  const util=window.__ffutil;
  const cb=({progress})=>{if(onProgress)onProgress(Math.max(1,Math.min(99,Math.round(progress*100))));};
  ff.on('progress',cb);
  try{
    await ff.writeFile('in',await util.fetchFile(file));
    await ff.exec(['-i','in','-t','10','-vf','scale=-2:720','-r','30','-c:v','libx264','-preset','veryfast','-crf','26','-pix_fmt','yuv420p','-c:a','aac','-b:a','96k','-movflags','+faststart','out.mp4']);
    const data=await ff.readFile('out.mp4');
    try{await ff.deleteFile('in');await ff.deleteFile('out.mp4');}catch(e){}
    if(!data||data.length<1000)throw new Error('empty output');
    return new Blob([data.buffer],{type:'video/mp4'});
  }finally{ff.off&&ff.off('progress',cb);}
}
function pickVideo(inp){
  const f=inp.files[0];if(!f)return;
  const t=T(),err=$('p-err'),b=$('vbtn');

      if(err)err.textContent='';
      const out=await transcodeVideo(f,p=>{if(b)b.textContent=t.videoConv+p+'%';});
      videoBlob=out;
      if(b){b.textContent=t.videoSet+' ('+(out.size/1048576).toFixed(1)+'MB)';b.classList.add('has');}
    }catch(e){

/* ---------------- MPI 검사/채점 ---------------- */
function buildSeq(v,lite){
  // 문항 언어 = 응시자의 모국어(국적 기준). 성별 척도와 무관하게 한국인은 한국어, 일본인은 일본어로 응시.
  // lite=true: MPI-Lite 간이판 (척도당 2문항, 타당도 문항 없음 — 비회원 유입용)
  const sc=SCALES[v],lang=(NAT==='jp')?'jp':'kr',ti=lang==='kr'?0:1,seq=[],R=lite?2:8;
  for(let r=0;r<R;r++)for(let s=0;s<sc.length;s++)
    seq.push({t:sc[s].it[r][ti],rev:sc[s].it[r][2],scale:sc[s].c,idx:r,kind:"c"});
  if(!lite){
    SD[lang].forEach((t,k)=>seq.splice(9+k*10,0,{t,kind:"sd",idx:k}));
    seq.splice(24,0,{t:INF[lang][0],kind:"inf",idx:0});
    seq.splice(48,0,{t:INF[lang][1],kind:"inf",idx:1});
    INC[v].forEach((o,k)=>seq.push({t:o.q[lang],kind:"inc",idx:k}));
  }
  return seq;
}
function startTest(){SEQ=buildSeq(VER,GUEST);ANS=new Array(SEQ.length).fill(0);pos=0;renderQ();}

  ONBFN=renderQ;
  const t=T(),q=SEQ[pos],pct=Math.round(pos/SEQ.length*100);
  const msg=t.lpMsg[Math.min(3,Math.floor(pct/25))];
  $('ob').innerHTML=`
  <div class="loveprog">
    <div class="lp-track"><div class="lp-fill" style="width:${pct}%"></div><div class="lp-walker" style="left:${pct}%">💌</div><div class="lp-goal">💘</div></div>
    <div class="lp-meta"><b>${msg}</b><span>${pos+1} / ${SEQ.length}</span></div>
  </div>
  <div class="qtext">${q.t}</div>
  <div class="obody"><div class="lik">${t.likert.map((l,k)=>`
    <div class="lk ${ANS[pos]===k+1?'sel':''}" onclick="pick(${k+1})"><span class="n">${k+1}</span>${l}</div>`).join('')}</div>
  <button class="backlink" onclick="if(pos>0){pos--;renderQ();}" ${pos===0?'style="visibility:hidden"':''}>${t.back}</button></div>`;
}
function pick(v){ANS[pos]=v;setTimeout(()=>{if(pos<SEQ.length-1){pos++;renderQ();}else score();},140);}
async function score(){
  const sc=SCALES[VER];
  const scores=sc.map(s=>{
    const vals=SEQ.map((q,i)=>q.kind==="c"&&q.scale===s.c?(q.rev?6-ANS[i]:ANS[i]):null).filter(x=>x!==null);
    return {c:s.c,n:s.n,cut:s.cut,gate:s.gate,mean:vals.reduce((a,b)=>a+b,0)/vals.length};
  });
  const sdHi=SEQ.filter((q,i)=>q.kind==="sd"&&ANS[i]>=4).length;
  const infHi=SEQ.filter((q,i)=>q.kind==="inf"&&ANS[i]>=4).length;
  const incFlags=GUEST?[]:INC[VER].map((o,k)=>{
    const vIdx=SEQ.findIndex(q=>q.kind==="inc"&&q.idx===k);
    const refItem=SCALES[VER].find(s=>s.c===o.ref[0]).it[o.ref[1]];
    const refIdx=SEQ.findIndex(q=>q.kind==="c"&&q.scale===o.ref[0]&&q.idx===o.ref[1]);
    const refKeyed=refItem[2]?6-ANS[refIdx]:ANS[refIdx];
    const vKeyed=o.dir===-1?6-ANS[vIdx]:ANS[vIdx];
    return Math.abs(vKeyed-refKeyed)>=3;
  });
  const verdict="pass"; // 파일럿 정책: 검사 완료 시 전원 통과 (타당도 지표는 연구용으로 기록만)
  RESULT={scores,verdict,sdHi,infHi,incN:incFlags.filter(x=>x).length,lite:GUEST||undefined,date:new Date().toISOString().slice(0,10)};
  if(GUEST){
    try{localStorage.setItem('musubi_guest',JSON.stringify({VER,NAT,RESULT}));}catch(e){}
  }else if(LIVE){
    const soc=scores.find(s=>s.gate===0);
    await sb.from('profiles').update({mpi:RESULT,social:soc.mean}).eq('id',ME.id);
  }
  resultScreen();
}
function resultScreen(){
  ONBFN=resultScreen;
  const t=T(),r=RESULT;

  const[cls,ti,de]=vmap[r.verdict];
  const ok=r.verdict==="pass"||r.verdict==="hold";
  $('ob').innerHTML=`${GUEST?`<div class="step">FREE TEST</div>`:`<div class="prog"><div class="bar" style="width:88%"></div></div>
  <div class="step">STEP 4 / 4</div>`}<h2>${t.resTitle}</h2>

  ${r.lite?`<div style="font-size:11.5px;color:var(--muted);line-height:1.6;background:var(--surface2);border:1px solid #3a3128;border-radius:12px;padding:10px 12px;margin-bottom:12px;">${t.liteNote}</div>`:''}
  ${typeCard(r)}
  ${compatSection(r,'res')}

  <div class="vflag">${t.vlab(r.sdHi,r.infHi,r.incN)}</div></div>
  <div class="ofoot"><button class="ghostbtn" style="border-color:var(--gold);color:var(--gold);margin-bottom:10px;" onclick="shareCard()">${t.shareBtn}</button>
    ${GUEST?`<button class="goldbtn" onclick="GUEST=false;${LIVE?"authScreen('signup')":"pickVer()"}">${t.guestJoin}</button>`

    :r.verdict==="invalid"?`<button class="goldbtn" onclick="startTest()">${t.retry}</button>`

  loadRecs('res');
}

async function loadRecs(sfx){
  const t=T(),wrap=$('recwrap-'+sfx);

  const r=RESULT;if(!r||!r.scores)return;
  if(GUEST||!LIVE||!ME){wrap.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:8px 2px;line-height:1.6;">${t.recGuest}</div>`;return;}
  const my=topCode(r);
  const comp=new Set(COMPAT[my]||[]);
  const og=VER==='m'?'f':'m';
  const {data:profs}=await sb.from('profiles').select('*').eq('gender',og).neq('id',ME.id).not('mpi','is',null).limit(60);
  const top=(profs||[])
    .filter(p=>!BLOCKED.has(p.id)&&comp.has(topCode(p.mpi)))
    .map(p=>({p,ty:typeOf(p.mpi,og)}))
    .filter(x=>x.ty)
    .slice(0,5);
  if(top.length===0){wrap.innerHTML=`<div style="font-size:12px;color:var(--muted);padding:8px 2px;line-height:1.6;">${t.recEmpty}</div>`;return;}
  wrap.innerHTML=`<div class="cmblabel" style="margin-top:12px;">${t.recTitle}</div>

    <div style="min-width:94px;max-width:94px;text-align:center;">
      <div style="width:94px;height:118px;border-radius:14px;border:1px solid #3a3128;background:#221c15;background-size:cover;background-position:center;${x.p.photo_url?`background-image:url('${x.p.photo_url}');`:''}"></div>
      <div style="font-size:11px;margin-top:5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(x.p.nickname)} · ${x.p.age||''}</div>
      <div style="font-size:9.5px;color:var(--gold);">${x.ty.e} ${x.ty.s}</div>
    </div>`).join('')}</div>`;
}
function scoreBar(s,t){
  const pill=s.gate===0&&s.mean>=s.cut?`<span class="pill p-ok">${t.evOk}</span>`:'';

}

  if(!mpi||!mpi.scores)return null;
  const sorted=[...mpi.scores].sort((a,b)=>b.mean-a.mean);

function typeCard(r){
  if(!r||!r.scores)return'';
  const sorted=[...r.scores].sort((a,b)=>b.mean-a.mean);
  const t1=TYPES[VER][sorted[0].c],t2=TYPES[VER][sorted[1].c];
  if(!t1)return'';
  return `<div class="typecard">
    <div class="tcode"><span>MUSUBI TYPE</span><b>${t1.c}-${t2.c}</b></div>
    <div class="te">${t1.e}</div><div class="tn2">${t1.n[LANG]}</div>
    <ul class="tbul">${t1.b[LANG].map(x=>`<li${x.startsWith('△')?' class="warn"':''}>${x}</li>`).join('')}</ul>
    <div class="tquote">“${t1.q[LANG]}”</div>
    <div class="chips" style="justify-content:center;">${sorted.slice(0,3).map(s=>`<span class="chip score">${SN(s.c)} ${Math.round(s.mean*20)}</span>`).join('')}</div>
    <div class="tm">${t1.m[LANG]}<br><span style="color:#6b5f4f">${LANG==='kr'?'서브 유형':'サブタイプ'}: ${t2.e} ${t2.n[LANG]} (${t2.c})</span></div>
  </div>`;
}

function rrect(x,px,py,w,h,r){x.beginPath();x.moveTo(px+r,py);x.arcTo(px+w,py,px+w,py+h,r);x.arcTo(px+w,py+h,px,py+h,r);x.arcTo(px,py+h,px,py,r);x.arcTo(px,py,px+w,py,r);x.closePath();}
function fitFont(x,text,maxW,base,weight){let s=base;x.font=(weight?weight+' ':'')+s+'px sans-serif';while(x.measureText(text).width>maxW&&s>18){s-=2;x.font=(weight?weight+' ':'')+s+'px sans-serif';}}

  let ty=null;
  if(RESULT&&RESULT.scores){
    const sorted=[...RESULT.scores].sort((a,b)=>b.mean-a.mean);
    const code=sorted[0].c,tt=TYPES[VER]&&TYPES[VER][code];
    if(tt)ty={e:tt.e,s:TSHORT[VER][code][viewerLang==='kr'?0:1]};
  }
  const chips=RESULT&&RESULT.scores?[...RESULT.scores].filter(s=>s.gate!==2).sort((a,b)=>b.mean-a.mean).slice(0,3)
    .map(s=>`${(SCALE_NAMES[s.c]||{})[viewerLang]||s.c} ${Math.round(s.mean*20)}`):[];
  $('prevnote').textContent=t.previewNote;
  $('prevclosebtn').textContent=t.close;
  $('prevcard').innerHTML=`<div class="pcard">
    <div class="photo" ${MYPROF&&MYPROF.photo_url?`style="background-image:url('${MYPROF.photo_url}')"`:''}></div><div class="grad"></div>
    <div class="vbadge">${vt.vbadge}</div>${ty?`<div class="tbadge">${ty.e} ${ty.s}</div>`:''}
    ${MYPROF&&MYPROF.video_url?`<div class="vplay" onclick="playVideo('${MYPROF.video_url}')">▶</div>`:''}
    <div class="pinfo"><h2>${esc(MYPROF?.nickname||'')}<span class="age">${MYPROF?.age||''}</span></h2>
    <div class="loc">📍 ${esc([MYPROF?.region,MYPROF?.bio].filter(Boolean).join(' · '))}</div>
    <div class="chips">${chips.map(x=>`<span class="chip score">${x}</span>`).join('')}</div></div>
  </div>`;
  $('prevov').classList.add('show');
}
function closePreview(){$('prevov').classList.remove('show');}
function playVideo(url){const v=$('vidplayer');v.src=url;$('vidov').classList.add('show');v.play().catch(()=>{});}
function closeVideo(){const v=$('vidplayer');v.pause();v.src='';$('vidov').classList.remove('show');}
async function changeVideo(inp){
  const f=inp.files[0];if(!f||!LIVE)return;
  const t=T();
  if(f.size>60*1024*1024){alert(t.videoBig);return;}
  const st=$('vchg');
  try{
    const out=await transcodeVideo(f,p=>{if(st)st.textContent=t.videoConv+p+'%';});
    videoBlob=out;
    if(st)st.textContent='⬆…';
    const url=await uploadVideo();
    let {error}=await sb.from('profiles').update({video_url:url}).eq('id',ME.id);
    if(error){alert(error.message);renderMy();}
    else{MYPROF.video_url=url;renderMy();}
  }catch(e){console.warn(e);alert(t.videoConvFail);renderMy();}
}
/* ---------------- 신고·차단 ---------------- */
function reportMenu(uid){
  const t=T();
  $('rep-h').textContent='⚑ '+t.reportTitle;
  $('repbody').innerHTML=`
    ${t.reportReasons.map((r,k)=>`<button class="repbtn" onclick="submitReport('${uid}',${k})">${r}</button>`).join('')}
    <button class="repbtn danger" onclick="blockUser('${uid}')">${t.blockBtn}</button>
    <button class="repbtn" style="border:none;background:none;color:#8d7f6d;" onclick="$('repov').classList.remove('show')">${t.cancel}</button>`;
  $('repov').classList.add('show');
}
async function submitReport(uid,k){
  const t=T();
  if(LIVE&&ME){try{await sb.from('reports').insert({reporter:ME.id,reported:uid,reason:t.reportReasons[k]});}catch(e){}}
  $('repov').classList.remove('show');
  alert(t.reportDone);
}
async function blockUser(uid){
  const t=T();
  if(LIVE&&ME){try{await sb.from('blocks').insert({blocker:ME.id,blocked:uid});}catch(e){}}
  BLOCKED.add(uid);
  $('repov').classList.remove('show');
  alert(t.blockDone);
  if(ROOM===uid){ROOM=null;showScreen('scr-chats');setTab('scr-chats');}
  await loadCards();await loadLikes();await loadChats();
}
function hideMatch(){$('matchov').classList.remove('show');}
function toMsg(){hideMatch();showScreen('scr-chats');setTab('scr-chats');}
function go(el){setTab(el.dataset.s);showScreen(el.dataset.s);}
function setTab(s){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.s===s));}
function showScreen(s){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));$(s).classList.add('active');}

updateLangSw();
boot();
</script>
